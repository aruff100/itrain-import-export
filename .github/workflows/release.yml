name: Installer bauen und veröffentlichen

# Baut für Windows, macOS und Linux jeweils einen nativen Installer
# (.msi / .dmg / .deb) über "./gradlew jpackage" (siehe build.gradle.kts,
# jlink { jpackage { ... } }-Block). jpackage kann NICHT für andere
# Plattformen cross-kompilieren - deshalb läuft dieser Workflow auf drei
# unterschiedlichen Runnern parallel (einer je Betriebssystem).
#
# Auslöser:
#   - Push eines Tags "v*" (z.B. "v1.0.0"): baut alle drei Installer UND
#     legt automatisch ein GitHub-Release mit allen drei Dateien zum
#     Download an.
#   - Manuell über "Run workflow" im GitHub-Actions-Tab (workflow_dispatch):
#     baut nur die Installer als Artefakte, ohne Release (zum Testen).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Quellcode auschecken
        uses: actions/checkout@v4

      - name: JDK 21 einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: fakeroot installieren (für jpackage --type deb unter Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Gradle-Wrapper ausführbar machen (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      # WICHTIG: shell: bash sorgt dafür, dass "./gradlew" auf allen drei
      # Plattformen gleich funktioniert - auch unter Windows nutzt der
      # GitHub-Actions-Runner dafür automatisch die mitgelieferte Git-Bash.
      - name: Installer bauen (jpackage)
        shell: bash
        run: ./gradlew jpackage --no-daemon

      - name: Installer als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            build/jpackage/*.msi
            build/jpackage/*.dmg
            build/jpackage/*.deb
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Alle Installer-Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: GitHub-Release mit allen drei Installern erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: installers/**/*
          generate_release_notes: true
