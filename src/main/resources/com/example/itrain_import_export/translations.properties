# Übersetzungsdatei für iTrain Import/Export
# ------------------------------------------------------------
# Format: schluessel.sprachcode = Text
# Sprachcodes: de=Deutsch, en=English, nl=Nederlands,
#              fr=Francais, es=Espanol, it=Italienisch
#
# Diese Datei kann von Hand geändert werden. Sie wird beim
# Programmstart eingelesen (UTF-8). Fehlt ein Eintrag für die
# aktuell gewählte Sprache, wird automatisch Englisch, sonst
# Deutsch als Rückfallebene verwendet.
#
# Platzhalter wie {0}, {1} werden zur Laufzeit durch Werte
# (z.B. Dateinamen) ersetzt und dürfen nicht entfernt werden.
# ------------------------------------------------------------

