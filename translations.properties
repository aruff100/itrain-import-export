help.updateTitle.sv=Uppdatering

help.updateText.de=Hilfe → Update prüft manuell, ob eine neuere Programmversion verfügbar ist. Zusätzlich läuft beim Programmstart automatisch eine stille Prüfung im Hintergrund (abschaltbar unter Voreinstellungen → Ansicht → "Beim Start automatisch nach Updates suchen"). Ist eine neue Version verfügbar, öffnet der Knopf "Herunterladen" den Proton-Drive-Freigabelink im Standard-Browser - der eigentliche Download läuft wie gewohnt über Proton Drive, die App selbst lädt nichts herunter und benötigt dafür keinerlei Anmeldedaten.
help.updateText.en=Help → Update manually checks whether a newer program version is available. In addition, a silent check runs automatically in the background on startup (can be turned off under Preferences → View → "Automatically check for updates on startup"). If a new version is available, the "Download" button opens the Proton Drive share link in your default browser - the actual download runs via Proton Drive as usual, the app itself does not download anything and requires no login credentials for this.
help.updateText.nl=Help → Update controleert handmatig of er een nieuwere programmaversie beschikbaar is. Daarnaast wordt bij het starten automatisch een stille controle op de achtergrond uitgevoerd (uit te schakelen onder Voorkeuren → Weergave → "Bij het starten automatisch naar updates zoeken"). Is er een nieuwe versie beschikbaar, dan opent de knop "Downloaden" de Proton Drive-deellink in uw standaardbrowser - de eigenlijke download verloopt zoals gebruikelijk via Proton Drive, de app zelf downloadt niets en heeft hiervoor geen inloggegevens nodig.
help.updateText.fr=Aide → Mise à jour vérifie manuellement si une version plus récente du programme est disponible. De plus, une vérification silencieuse s'exécute automatiquement en arrière-plan au démarrage (désactivable sous Préférences → Affichage → « Rechercher automatiquement les mises à jour au démarrage »). Si une nouvelle version est disponible, le bouton « Télécharger » ouvre le lien de partage Proton Drive dans votre navigateur par défaut - le téléchargement proprement dit se déroule comme d'habitude via Proton Drive, l'application elle-même ne télécharge rien et n'a besoin d'aucune donnée de connexion pour cela.
help.updateText.es=Ayuda → Actualización comprueba manualmente si hay una versión más reciente del programa disponible. Además, al iniciar se ejecuta automáticamente una comprobación silenciosa en segundo plano (desactivable en Preferencias → Vista → «Buscar actualizaciones automáticamente al iniciar»). Si hay una nueva versión disponible, el botón «Descargar» abre el enlace de Proton Drive en su navegador predeterminado; la descarga en sí se realiza como de costumbre a través de Proton Drive, la aplicación no descarga nada por sí misma y no necesita ningún dato de acceso para ello.
help.updateText.it=Guida → Aggiornamento verifica manualmente se è disponibile una versione più recente del programma. Inoltre, all'avvio viene eseguita automaticamente anche una verifica silenziosa in background (disattivabile in Preferenze → Visualizzazione → «Cerca automaticamente aggiornamenti all'avvio»). Se è disponibile una nuova versione, il pulsante «Scarica» apre il link di condivisione di Proton Drive nel browser predefinito - il download vero e proprio avviene come al solito tramite Proton Drive, l'app stessa non scarica nulla e non necessita di credenziali di accesso per farlo.
help.updateText.pt=Ajuda → Atualização verifica manualmente se está disponível uma versão mais recente do programa. Além disso, ao iniciar o programa é executada automaticamente uma verificação silenciosa em segundo plano (pode ser desativada em Preferências → Vista → "Verificar automaticamente se há atualizações ao iniciar"). Se estiver disponível uma nova versão, o botão "Transferir" abre a ligação de partilha do Proton Drive no navegador predefinido - a transferência em si decorre normalmente através do Proton Drive; a própria aplicação não transfere nada e não necessita de quaisquer dados de acesso para isso.
help.updateText.pl=Pomoc → Aktualizacja ręcznie sprawdza, czy dostępna jest nowsza wersja programu. Dodatkowo przy uruchomieniu programu automatycznie wykonywane jest ciche sprawdzenie w tle (można je wyłączyć w Preferencje → Widok → „Automatycznie sprawdzaj dostępność aktualizacji przy uruchomieniu”). Jeśli dostępna jest nowa wersja, przycisk „Pobierz” otwiera link udostępniania Proton Drive w domyślnej przeglądarce - samo pobieranie odbywa się jak zwykle za pośrednictwem Proton Drive, sama aplikacja niczego nie pobiera i nie wymaga do tego żadnych danych logowania.
help.updateText.da=Hjælp → Opdatering tjekker manuelt, om der er en nyere programversion tilgængelig. Derudover udføres der automatisk et stille tjek i baggrunden ved programstart (kan slås fra under Præferencer → Visning → "Søg automatisk efter opdateringer ved start"). Hvis der er en ny version tilgængelig, åbner knappen "Download" Proton Drive-delelinket i standardbrowseren - selve downloadet foregår som sædvanligt via Proton Drive, appen selv downloader intet og kræver ingen loginoplysninger til dette.
help.updateText.sv=Hjälp → Uppdatering söker manuellt efter om en nyare programversion är tillgänglig. Dessutom görs automatiskt en tyst kontroll i bakgrunden vid programstart (kan stängas av under Inställningar → Visning → "Sök automatiskt efter uppdateringar vid start"). Om en ny version är tillgänglig öppnar knappen "Ladda ner" Proton Drive-delningslänken i standardwebbläsaren - själva nedladdningen sker som vanligt via Proton Drive, appen laddar inte ner något själv och behöver inga inloggningsuppgifter för detta.

help.categoryViewTitle.de=Kategorie-Ansicht: Import, Export und Bearbeiten
help.categoryViewTitle.en=Category view: import, export and editing
help.categoryViewTitle.nl=Categorieweergave: importeren, exporteren en bewerken
help.categoryViewTitle.fr=Vue par catégorie : import, export et modification
help.categoryViewTitle.es=Vista de categoría: importar, exportar y editar
help.categoryViewTitle.it=Vista per categoria: importazione, esportazione e modifica
help.categoryViewTitle.pt=Vista de categoria: importar, exportar e editar
help.categoryViewTitle.pl=Widok kategorii: import, eksport i edycja
help.categoryViewTitle.da=Kategorivisning: import, eksport og redigering
help.categoryViewTitle.sv=Kategorivy: import, export och redigering

help.categoryViewText.de=Jeder Reiter zeigt eine der iTrain-Kategorien (z.B. Rückmeldungen, Blöcke, Aktionen). "Markierte exportieren" speichert die ausgewählten Einträge als CSV-Datei, inklusive automatisch erkannter, referenzierter Einträge aus anderen Kategorien (siehe nächster Abschnitt zur "~"-Kennzeichnung). "Importieren" liest eine solche CSV-Datei wieder ein und verteilt jede Zeile automatisch in ihre passende Kategorie. Ein neuer Eintrag wird über das "+"-Symbol angelegt, Löschen über das rote "X" - beide rechts über der Tabelle.
help.categoryViewText.en=Each tab shows one of the iTrain categories (e.g. feedbacks, blocks, actions). "Export selected" saves the selected entries as a CSV file, including automatically detected entries referenced from other categories (see the next section on "~" marking). "Import" reads such a CSV file back in and automatically sorts each row into its matching category. A new entry is created via the "+" symbol, deletion via the red "X" - both above the table on the right.
help.categoryViewText.nl=Elk tabblad toont een van de iTrain-categorieën (bijv. terugmeldingen, blokken, acties). "Gemarkeerde exporteren" slaat de geselecteerde items op als CSV-bestand, inclusief automatisch herkende, gerefereerde items uit andere categorieën (zie de volgende sectie over de "~"-markering). "Importeren" leest zo'n CSV-bestand weer in en verdeelt elke rij automatisch over de juiste categorie. Een nieuw item wordt aangemaakt via het "+"-symbool, verwijderen via het rode "X" - beide rechtsboven de tabel.
help.categoryViewText.fr=Chaque onglet affiche l'une des catégories iTrain (par ex. rétrosignalisations, cantons, actions). « Exporter la sélection » enregistre les entrées sélectionnées dans un fichier CSV, y compris les entrées référencées automatiquement détectées dans d'autres catégories (voir la section suivante sur le marquage « ~ »). « Importer » relit un tel fichier CSV et répartit automatiquement chaque ligne dans la catégorie correspondante. Une nouvelle entrée se crée via le symbole « + », la suppression via le « X » rouge - tous deux au-dessus du tableau, à droite.
help.categoryViewText.es=Cada pestaña muestra una de las categorías de iTrain (por ejemplo, señales de retorno, bloques, acciones). «Exportar seleccionados» guarda las entradas seleccionadas como archivo CSV, incluidas las entradas referenciadas detectadas automáticamente de otras categorías (véase la siguiente sección sobre el marcado con «~»). «Importar» vuelve a leer dicho archivo CSV y distribuye automáticamente cada fila en su categoría correspondiente. Una nueva entrada se crea mediante el símbolo «+», y se elimina mediante la «X» roja - ambos situados a la derecha, encima de la tabla.
help.categoryViewText.it=Ogni scheda mostra una delle categorie iTrain (ad es. segnali di ritorno, blocchi, azioni). «Esporta selezionati» salva le voci selezionate come file CSV, incluse le voci referenziate rilevate automaticamente da altre categorie (vedi la sezione successiva sulla marcatura con «~»). «Importa» rilegge un file CSV di questo tipo e distribuisce automaticamente ogni riga nella categoria corrispondente. Una nuova voce si crea tramite il simbolo «+», l'eliminazione tramite la «X» rossa - entrambi in alto a destra sopra la tabella.
help.categoryViewText.pt=Cada separador mostra uma das categorias do iTrain (por exemplo, sinalizações de retorno, blocos, ações). "Exportar selecionados" guarda as entradas selecionadas como um ficheiro CSV, incluindo entradas referenciadas de outras categorias detetadas automaticamente (ver a secção seguinte sobre a marcação "~"). "Importar" lê novamente um ficheiro CSV desse tipo e distribui automaticamente cada linha pela categoria correspondente. Uma nova entrada é criada através do símbolo "+", a eliminação através do "X" vermelho - ambos à direita, por cima da tabela.
help.categoryViewText.pl=Każda karta pokazuje jedną z kategorii iTrain (np. czujniki zwrotne, bloki, akcje). „Eksportuj zaznaczone” zapisuje zaznaczone wpisy jako plik CSV, wraz z automatycznie wykrytymi wpisami powiązanymi z innych kategorii (zob. następną sekcję dotyczącą oznaczenia „~”). „Importuj” wczytuje taki plik CSV ponownie i automatycznie rozdziela każdy wiersz do właściwej kategorii. Nowy wpis tworzy się za pomocą symbolu „+”, usuwanie za pomocą czerwonego „X” - oba znajdują się po prawej stronie nad tabelą.
help.categoryViewText.da=Hver fane viser en af iTrains kategorier (f.eks. tilbagemeldinger, blokke, handlinger). "Eksportér markerede" gemmer de valgte poster som en CSV-fil, inklusive automatisk registrerede, refererede poster fra andre kategorier (se næste afsnit om "~"-mærkning). "Importér" indlæser en sådan CSV-fil igen og fordeler automatisk hver linje til den rette kategori. En ny post oprettes via "+"-symbolet, sletning via det røde "X" - begge til højre over tabellen.
help.categoryViewText.sv=Varje flik visar en av iTrains kategorier (t.ex. återkopplingar, block, åtgärder). "Exportera markerade" sparar de valda posterna som en CSV-fil, inklusive automatiskt upptäckta, refererade poster från andra kategorier (se nästa avsnitt om "~"-märkning). "Importera" läser in en sådan CSV-fil igen och fördelar automatiskt varje rad till rätt kategori. En ny post skapas via "+"-symbolen, borttagning via det röda "X" - båda till höger ovanför tabellen.

help.selectionTitle.de=Mehrfachauswahl in der Tabelle
help.selectionTitle.en=Multi-selection in the table
help.selectionTitle.nl=Meervoudige selectie in de tabel
help.selectionTitle.fr=Sélection multiple dans le tableau
help.selectionTitle.es=Selección múltiple en la tabla
help.selectionTitle.it=Selezione multipla nella tabella
help.selectionTitle.pt=Seleção múltipla na tabela
help.selectionTitle.pl=Zaznaczanie wielu wierszy w tabeli
help.selectionTitle.da=Flervalg i tabellen
help.selectionTitle.sv=Flerval i tabellen

help.selectionText.de=Ein einfacher Mausklick auf eine Zeile wählt genau diese eine Zeile aus (alle anderen werden abgewählt). Mausklick zusammen mit Strg (Windows/Linux) bzw. Cmd (macOS) fügt eine einzelne weitere Zeile zur bestehenden Auswahl hinzu bzw. entfernt eine bereits ausgewählte Zeile wieder daraus - so lassen sich beliebige, nicht zusammenhängende Zeilen kombinieren. Mausklick zusammen mit Umschalt/Shift wählt den kompletten Bereich zwischen der zuletzt angeklickten und der neu angeklickten Zeile aus. Diese Mehrfachauswahl ist die Grundlage für "Markierte exportieren" sowie für das Löschen mehrerer Einträge auf einmal.
help.selectionText.en=A simple mouse click on a row selects exactly that one row (all others are deselected). Clicking together with Ctrl (Windows/Linux) or Cmd (macOS) adds a single additional row to the existing selection, or removes an already-selected row from it - allowing any combination of non-contiguous rows. Clicking together with Shift selects the entire range between the last-clicked row and the newly clicked one. This multi-selection is the basis for "Export selected" as well as for deleting several entries at once.
help.selectionText.nl=Een gewone muisklik op een rij selecteert precies die ene rij (alle andere worden gedeselecteerd). Klikken samen met Ctrl (Windows/Linux) of Cmd (macOS) voegt één extra rij toe aan de bestaande selectie, of verwijdert een reeds geselecteerde rij eruit - zo kunnen willekeurige, niet-aaneengesloten rijen worden gecombineerd. Klikken samen met Shift selecteert het volledige bereik tussen de laatst aangeklikte en de nieuw aangeklikte rij. Deze meervoudige selectie is de basis voor "Markering exporteren" en voor het in één keer verwijderen van meerdere items.
help.selectionText.fr=Un simple clic sur une ligne sélectionne uniquement cette ligne (toutes les autres sont désélectionnées). Cliquer avec Ctrl (Windows/Linux) ou Cmd (macOS) ajoute une ligne supplémentaire à la sélection existante, ou retire une ligne déjà sélectionnée - permettant de combiner des lignes non contiguës. Cliquer avec Maj (Shift) sélectionne toute la plage entre la dernière ligne cliquée et la nouvelle. Cette sélection multiple est la base du bouton « Exporter la sélection » ainsi que de la suppression de plusieurs entrées à la fois.
help.selectionText.es=Un simple clic en una fila selecciona exactamente esa fila (todas las demás se deseleccionan). Hacer clic junto con Ctrl (Windows/Linux) o Cmd (macOS) añade una fila adicional a la selección existente, o elimina una fila ya seleccionada - permitiendo combinar filas no contiguas. Hacer clic junto con Mayús (Shift) selecciona todo el rango entre la última fila pulsada y la nueva. Esta selección múltiple es la base del botón «Exportar seleccionados» y para eliminar varias entradas a la vez.
help.selectionText.it=Un semplice clic su una riga seleziona esattamente quella riga (tutte le altre vengono deselezionate). Cliccando insieme a Ctrl (Windows/Linux) o Cmd (macOS) si aggiunge una singola riga aggiuntiva alla selezione esistente, oppure si rimuove una riga già selezionata - permettendo di combinare righe non contigue. Cliccando insieme a Maiusc (Shift) si seleziona l'intero intervallo tra l'ultima riga cliccata e quella appena cliccata. Questa selezione multipla è alla base di «Esporta selezionati» e dell'eliminazione di più voci contemporaneamente.
help.selectionText.pt=Um simples clique do rato numa linha seleciona exatamente essa linha (todas as outras são desmarcadas). Clicar em conjunto com Ctrl (Windows/Linux) ou Cmd (macOS) adiciona uma única linha adicional à seleção existente, ou remove uma linha já selecionada - permitindo combinar linhas não contíguas à vontade. Clicar em conjunto com Shift seleciona todo o intervalo entre a última linha clicada e a linha recém-clicada. Esta seleção múltipla é a base para "Exportar selecionados", bem como para eliminar vários registos de uma só vez.
help.selectionText.pl=Zwykłe kliknięcie wiersza wybiera dokładnie ten jeden wiersz (wszystkie inne zostają odznaczone). Kliknięcie razem z Ctrl (Windows/Linux) lub Cmd (macOS) dodaje pojedynczy kolejny wiersz do istniejącego zaznaczenia lub usuwa z niego już zaznaczony wiersz - pozwalając łączyć dowolne, nieciągłe wiersze. Kliknięcie razem z Shift zaznacza cały zakres między ostatnio klikniętym a nowo klikniętym wierszem. To zaznaczanie wielokrotne jest podstawą funkcji „Eksportuj zaznaczone”, a także usuwania kilku wpisów naraz.
help.selectionText.da=Et enkelt museklik på en række vælger præcis denne ene række (alle andre fravælges). Klik sammen med Ctrl (Windows/Linux) eller Cmd (macOS) tilføjer en enkelt yderligere række til den eksisterende markering eller fjerner en allerede valgt række igen - så kan vilkårlige, ikke-sammenhængende rækker kombineres. Klik sammen med Shift vælger hele intervallet mellem den sidst klikkede og den nyligt klikkede række. Denne flervalgsfunktion er grundlaget for "Eksportér markerede" samt for at slette flere poster på én gang.
help.selectionText.sv=Ett enkelt musklick på en rad väljer exakt den raden (alla andra avmarkeras). Att klicka tillsammans med Ctrl (Windows/Linux) eller Cmd (macOS) lägger till ytterligare en rad i den befintliga markeringen, eller tar bort en redan markerad rad från den - så att godtyckliga, icke sammanhängande rader kan kombineras. Att klicka tillsammans med Skift markerar hela intervallet mellan den senast klickade och den nyss klickade raden. Denna flervalsfunktion är grunden för "Exportera markerade" samt för att ta bort flera poster på en gång.

help.referenceRenameTitle.de=Verknüpfte Einträge: Kennzeichnung mit "~"
help.referenceRenameTitle.en="~" marking for linked entries
help.referenceRenameTitle.nl=Gekoppelde items: markering met "~"
help.referenceRenameTitle.fr=Entrées liées : marquage par « ~ »
help.referenceRenameTitle.es=Entradas vinculadas: marcado con «~»
help.referenceRenameTitle.it=Voci collegate: contrassegno con «~»
help.referenceRenameTitle.pt=Entradas vinculadas: marcação com "~"
help.referenceRenameTitle.pl=Powiązane wpisy: oznaczenie znakiem "~"
help.referenceRenameTitle.da=Tilknyttede poster: markering med "~"
help.referenceRenameTitle.sv=Länkade poster: markering med "~"

help.referenceRenameText.de=Damit referenzierte Einträge nicht mit gleichnamigen, bereits in der Zieldatei vorhandenen Einträgen kollidieren, werden sie beim Export umbenannt: sowohl ihr eigener Name als auch jede Stelle, an der sie referenziert werden, bekommen ein vorangestelltes "~" (z.B. wird aus "RM1" überall "~RM1"). Die Zieldatei bleibt dadurch nach dem Import in iTrain vollständig funktionsfähig - Referenz und Definition passen weiterhin zusammen, die Datei lässt sich also öffnen und ausführen. Die "~"-Namen sind aber nur ein Provisorium: der Anwender sollte sie anschließend in iTrain selbst manuell in aussagekräftige Namen zurückändern - iTrain aktualisiert dabei automatisch alle Stellen, an denen der Eintrag verwendet wird. Importiert der Anwender innerhalb derselben Sitzung (solange dieselbe Datei geöffnet bleibt) mehrere solcher Export-Dateien nacheinander, würde der erste "~RM1" sonst mit einem zweiten, eigentlich anderen "~RM1" kollidieren - deshalb bekommt jeder weitere Import in derselben Sitzung zusätzlich eine laufende Nummer direkt nach dem "~": der erste Import bleibt bei "~", der zweite wird zu "~1", der dritte zu "~2" und so weiter. Diese Nummer wird beim Öffnen einer neuen Datei wieder zurückgesetzt.
help.referenceRenameText.en=So that referenced entries don't collide with same-named entries already present in the target file, they are renamed on export: both their own name and every place that references them get a leading "~" (e.g. "RM1" becomes "~RM1" everywhere). This keeps the target file fully functional in iTrain after import - the reference and the definition still match, so the file can be opened and run. However, the "~" names are only a placeholder: afterwards, the user should manually rename them back to meaningful names in iTrain itself - iTrain automatically updates every place the entry is used. If the user imports several such export files one after another within the same session (as long as the same file stays open), the first "~RM1" would otherwise collide with a second, actually different "~RM1" - so every further import within the same session additionally gets a running number right after the "~": the first import stays "~", the second becomes "~1", the third "~2", and so on. This number is reset again when a new file is opened.
help.referenceRenameText.nl=Om te voorkomen dat gerefereerde items botsen met gelijknamige items die al in het doelbestand aanwezig zijn, worden ze bij het exporteren hernoemd: zowel hun eigen naam als elke plek waar ze worden gerefereerd krijgen een voorafgaand "~" (bijv. wordt "RM1" overal "~RM1"). Het doelbestand blijft daardoor na het importeren volledig functioneel in iTrain - referentie en definitie blijven bij elkaar passen, het bestand kan dus geopend en uitgevoerd worden. De "~"-namen zijn echter slechts een tijdelijke oplossing: de gebruiker moet ze daarna handmatig in iTrain zelf weer een betekenisvolle naam geven - iTrain werkt daarbij automatisch alle plekken bij waar het item wordt gebruikt. Importeert de gebruiker binnen dezelfde sessie (zolang hetzelfde bestand geopend blijft) meerdere van dergelijke exportbestanden na elkaar, dan zou de eerste "~RM1" anders botsen met een tweede, eigenlijk andere "~RM1" - daarom krijgt elke volgende import binnen dezelfde sessie extra een doorlopend nummer direct na de "~": de eerste import blijft "~", de tweede wordt "~1", de derde "~2", enzovoort. Dit nummer wordt weer teruggezet zodra een nieuw bestand wordt geopend.
help.referenceRenameText.fr=Pour que les entrées référencées n'entrent pas en conflit avec des entrées de même nom déjà présentes dans le fichier cible, elles sont renommées lors de l'export : leur propre nom ainsi que chaque endroit où elles sont référencées reçoivent un « ~ » en préfixe (par ex. « RM1 » devient « ~RM1 » partout). Le fichier cible reste ainsi entièrement fonctionnel dans iTrain après l'import - la référence et la définition restent cohérentes, le fichier peut donc être ouvert et utilisé. Les noms en « ~ » ne sont toutefois que provisoires : l'utilisateur doit ensuite les renommer manuellement dans iTrain lui-même avec des noms parlants - iTrain met alors automatiquement à jour tous les endroits où l'entrée est utilisée. Si l'utilisateur importe plusieurs de ces fichiers d'export les uns après les autres au cours de la même session (tant que le même fichier reste ouvert), le premier « ~RM1 » entrerait sinon en conflit avec un second « ~RM1 », en réalité différent - c'est pourquoi chaque import supplémentaire dans la même session reçoit en plus un numéro croissant directement après le « ~ » : le premier import reste « ~ », le deuxième devient « ~1 », le troisième « ~2 », et ainsi de suite. Ce numéro est réinitialisé à l'ouverture d'un nouveau fichier.
help.referenceRenameText.es=Para que las entradas referenciadas no choquen con entradas del mismo nombre ya presentes en el archivo de destino, se renombran durante la exportación: tanto su propio nombre como cada lugar donde se referencian reciben un «~» al principio (por ejemplo, «RM1» se convierte en «~RM1» en todas partes). Así, el archivo de destino permanece totalmente funcional en iTrain tras la importación - la referencia y la definición siguen coincidiendo, por lo que el archivo puede abrirse y ejecutarse. Sin embargo, los nombres con «~» son solo provisionales: el usuario debe renombrarlos manualmente después en el propio iTrain con nombres significativos - iTrain actualiza automáticamente todos los lugares donde se usa la entrada. Si el usuario importa varios de estos archivos de exportación uno tras otro dentro de la misma sesión (mientras el mismo archivo permanezca abierto), el primer «~RM1» chocaría con un segundo «~RM1» en realidad distinto - por eso, cada importación adicional dentro de la misma sesión recibe además un número consecutivo justo después del «~»: la primera importación se queda en «~», la segunda pasa a «~1», la tercera a «~2», y así sucesivamente. Este número se reinicia al abrir un nuevo archivo.
help.referenceRenameText.it=Affinché le voci referenziate non entrino in conflitto con voci omonime già presenti nel file di destinazione, vengono rinominate durante l'esportazione: sia il proprio nome sia ogni punto in cui vengono referenziate ricevono un «~» iniziale (ad es. «RM1» diventa ovunque «~RM1»). Il file di destinazione resta così completamente funzionante in iTrain dopo l'importazione - il riferimento e la definizione continuano a corrispondere, quindi il file può essere aperto ed eseguito. I nomi con «~» sono però solo provvisori: l'utente dovrebbe poi rinominarli manualmente in iTrain stesso con nomi significativi - iTrain aggiorna automaticamente tutti i punti in cui la voce viene utilizzata. Se l'utente importa più file di esportazione di questo tipo uno dopo l'altro nella stessa sessione (finché lo stesso file resta aperto), il primo «~RM1» entrerebbe altrimenti in conflitto con un secondo «~RM1», in realtà diverso - per questo ogni ulteriore importazione nella stessa sessione riceve in aggiunta un numero progressivo subito dopo il «~»: la prima importazione resta «~», la seconda diventa «~1», la terza «~2» e così via. Questo numero viene azzerato all'apertura di un nuovo file.
help.referenceRenameText.pt=Para que as entradas referenciadas não colidam com entradas de nome igual já presentes no ficheiro de destino, são renomeadas durante a exportação: tanto o seu próprio nome como cada local onde são referenciadas recebem um "~" à frente (por exemplo, "RM1" passa a "~RM1" em todo o lado). Assim, o ficheiro de destino permanece totalmente funcional no iTrain após a importação - a referência e a definição continuam a corresponder-se, pelo que o ficheiro pode ser aberto e executado. No entanto, os nomes com "~" são apenas um estado provisório: o utilizador deve depois renomeá-los manualmente no próprio iTrain para nomes significativos - o iTrain atualiza automaticamente todos os locais onde a entrada é utilizada. Se o utilizador importar vários destes ficheiros de exportação, um a seguir ao outro, dentro da mesma sessão (enquanto o mesmo ficheiro permanecer aberto), o primeiro "~RM1" entraria em conflito com um segundo "~RM1", na realidade diferente - por isso, cada importação adicional dentro da mesma sessão recebe também um número sequencial logo a seguir ao "~": a primeira importação mantém-se em "~", a segunda passa a "~1", a terceira a "~2" e assim sucessivamente. Este número é reposto ao abrir um novo ficheiro.
help.referenceRenameText.pl=Aby powiązane wpisy nie kolidowały z wpisami o tej samej nazwie już obecnymi w pliku docelowym, są one zmieniane przy eksporcie: zarówno ich własna nazwa, jak i każde miejsce, w którym są przywoływane, otrzymują poprzedzający znak „~” (np. „RM1” staje się wszędzie „~RM1”). Dzięki temu plik docelowy pozostaje po imporcie w pełni funkcjonalny w iTrain - odwołanie i definicja nadal do siebie pasują, więc plik można otworzyć i uruchomić. Nazwy z „~” są jednak tylko rozwiązaniem tymczasowym: użytkownik powinien następnie ręcznie zmienić je w samym iTrain na znaczące nazwy - iTrain automatycznie aktualizuje wtedy wszystkie miejsca, w których dany wpis jest używany. Jeśli użytkownik zaimportuje w tej samej sesji (dopóki ten sam plik pozostaje otwarty) kilka takich plików eksportu jeden po drugim, pierwszy „~RM1” kolidowałby z drugim, w rzeczywistości innym „~RM1” - dlatego każdy kolejny import w tej samej sesji otrzymuje dodatkowo kolejny numer bezpośrednio po „~”: pierwszy import pozostaje przy „~”, drugi staje się „~1”, trzeci „~2” i tak dalej. Ten numer jest resetowany po otwarciu nowego pliku.
help.referenceRenameText.da=For at referererede poster ikke kolliderer med enslydende poster, der allerede findes i målfilen, bliver de omdøbt ved eksport: både deres eget navn og alle steder, hvor der refereres til dem, får et foranstillet "~" (f.eks. bliver "RM1" til "~RM1" alle steder). Målfilen forbliver derved fuldt funktionsdygtig i iTrain efter import - referencen og definitionen passer stadig sammen, så filen kan åbnes og køres. "~"-navnene er dog kun midlertidige: brugeren bør efterfølgende omdøbe dem manuelt i selve iTrain til meningsfulde navne - iTrain opdaterer automatisk alle steder, hvor posten bruges. Hvis brugeren importerer flere sådanne eksportfiler efter hinanden inden for samme session (så længe den samme fil forbliver åben), ville den første "~RM1" ellers kollidere med en anden, faktisk forskellig "~RM1" - derfor får hver yderligere import inden for samme session desuden et løbenummer direkte efter "~": den første import forbliver ved "~", den anden bliver til "~1", den tredje til "~2" og så videre. Dette nummer nulstilles igen, når en ny fil åbnes.
help.referenceRenameText.sv=För att refererade poster inte ska kollidera med likadant namngivna poster som redan finns i målfilen döps de om vid export: både deras eget namn och varje plats där de refereras får ett inledande "~" (t.ex. blir "RM1" till "~RM1" överallt). Målfilen förblir därigenom fullt fungerande i iTrain efter import - referensen och definitionen stämmer fortfarande överens, så filen kan öppnas och köras. "~"-namnen är dock bara provisoriska: användaren bör därefter manuellt döpa om dem i själva iTrain till meningsfulla namn - iTrain uppdaterar då automatiskt alla ställen där posten används. Om användaren importerar flera sådana exportfiler efter varandra inom samma session (så länge samma fil förblir öppen) skulle den första "~RM1" annars kollidera med en andra, egentligen annan "~RM1" - därför får varje ytterligare import inom samma session dessutom ett löpnummer direkt efter "~": den första importen förblir vid "~", den andra blir "~1", den tredje "~2" och så vidare. Detta nummer återställs igen när en ny fil öppnas.

