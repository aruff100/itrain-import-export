help.helpMenuText.de=Hilfe zeigt diesen Text. Update prüft (sobald verfügbar) auf neue Programmversionen. Über zeigt Programmname, Autor und die aktuelle Versions-/Build-Nummer.
help.helpMenuText.en=Help shows this text. Update checks (once available) for new program versions. About shows the program name, author, and current version/build number.
help.helpMenuText.nl=Help toont deze tekst. Update controleert (zodra beschikbaar) op nieuwe programmaversies. Over toont programmanaam, auteur en het huidige versie-/buildnummer.
help.helpMenuText.fr=Aide affiche ce texte. Mise à jour vérifie (dès que disponible) l'existence de nouvelles versions du programme. À propos affiche le nom du programme, l'auteur et le numéro de version/build actuel.
help.helpMenuText.es=Ayuda muestra este texto. Actualización comprueba (en cuanto esté disponible) si hay nuevas versiones del programa. Acerca de muestra el nombre del programa, el autor y el número de versión/compilación actual.
help.helpMenuText.it=Guida mostra questo testo. Aggiornamento verifica (non appena disponibile) la presenza di nuove versioni del programma. Informazioni su mostra nome del programma, autore e numero di versione/build attuale.

help.categoryViewTitle.de=Kategorie-Ansicht: Import, Export und Bearbeiten
help.categoryViewTitle.en=Category view: import, export and editing
help.categoryViewTitle.nl=Categorieweergave: importeren, exporteren en bewerken
help.categoryViewTitle.fr=Vue par catégorie : import, export et modification
help.categoryViewTitle.es=Vista de categoría: importar, exportar y editar
help.categoryViewTitle.it=Vista per categoria: importazione, esportazione e modifica

help.categoryViewText.de=Jeder Reiter zeigt eine der iTrain-Kategorien (z.B. Rückmeldungen, Blöcke, Aktionen). "Markierte exportieren" speichert die ausgewählten Einträge als CSV-Datei, inklusive automatisch erkannter, referenzierter Einträge aus anderen Kategorien (siehe nächster Abschnitt zur "~"-Kennzeichnung). "Importieren" liest eine solche CSV-Datei wieder ein und verteilt jede Zeile automatisch in ihre passende Kategorie. Ein neuer Eintrag wird über das "+"-Symbol angelegt, Löschen über das rote "X" - beide rechts über der Tabelle.
help.categoryViewText.en=Each tab shows one of the iTrain categories (e.g. feedbacks, blocks, actions). "Export selected" saves the selected entries as a CSV file, including automatically detected entries referenced from other categories (see the next section on "~" marking). "Import" reads such a CSV file back in and automatically sorts each row into its matching category. A new entry is created via the "+" symbol, deletion via the red "X" - both above the table on the right.
help.categoryViewText.nl=Elk tabblad toont een van de iTrain-categorieën (bijv. terugmeldingen, blokken, acties). "Gemarkeerde exporteren" slaat de geselecteerde items op als CSV-bestand, inclusief automatisch herkende, gerefereerde items uit andere categorieën (zie de volgende sectie over de "~"-markering). "Importeren" leest zo'n CSV-bestand weer in en verdeelt elke rij automatisch over de juiste categorie. Een nieuw item wordt aangemaakt via het "+"-symbool, verwijderen via het rode "X" - beide rechtsboven de tabel.
help.categoryViewText.fr=Chaque onglet affiche l'une des catégories iTrain (par ex. rétrosignalisations, cantons, actions). « Exporter la sélection » enregistre les entrées sélectionnées dans un fichier CSV, y compris les entrées référencées automatiquement détectées dans d'autres catégories (voir la section suivante sur le marquage « ~ »). « Importer » relit un tel fichier CSV et répartit automatiquement chaque ligne dans la catégorie correspondante. Une nouvelle entrée se crée via le symbole « + », la suppression via le « X » rouge - tous deux au-dessus du tableau, à droite.
help.categoryViewText.es=Cada pestaña muestra una de las categorías de iTrain (por ejemplo, señales de retorno, bloques, acciones). «Exportar seleccionados» guarda las entradas seleccionadas como archivo CSV, incluidas las entradas referenciadas detectadas automáticamente de otras categorías (véase la siguiente sección sobre el marcado con «~»). «Importar» vuelve a leer dicho archivo CSV y distribuye automáticamente cada fila en su categoría correspondiente. Una nueva entrada se crea mediante el símbolo «+», y se elimina mediante la «X» roja - ambos situados a la derecha, encima de la tabla.
help.categoryViewText.it=Ogni scheda mostra una delle categorie iTrain (ad es. segnali di ritorno, blocchi, azioni). «Esporta selezionati» salva le voci selezionate come file CSV, incluse le voci referenziate rilevate automaticamente da altre categorie (vedi la sezione successiva sulla marcatura con «~»). «Importa» rilegge un file CSV di questo tipo e distribuisce automaticamente ogni riga nella categoria corrispondente. Una nuova voce si crea tramite il simbolo «+», l'eliminazione tramite la «X» rossa - entrambi in alto a destra sopra la tabella.

help.referenceRenameTitle.de=Verknüpfte Einträge: Kennzeichnung mit "~"
help.referenceRenameTitle.en="~" marking for linked entries
help.referenceRenameTitle.nl=Gekoppelde items: markering met "~"
help.referenceRenameTitle.fr=Entrées liées : marquage par « ~ »
help.referenceRenameTitle.es=Entradas vinculadas: marcado con «~»
help.referenceRenameTitle.it=Voci collegate: contrassegno con «~»

help.referenceRenameText.de=Damit referenzierte Einträge nicht mit gleichnamigen, bereits in der Zieldatei vorhandenen Einträgen kollidieren, werden sie beim Export umbenannt: sowohl ihr eigener Name als auch jede Stelle, an der sie referenziert werden, bekommen ein vorangestelltes "~" (z.B. wird aus "RM1" überall "~RM1"). Die Zieldatei bleibt dadurch nach dem Import in iTrain vollständig funktionsfähig - Referenz und Definition passen weiterhin zusammen, die Datei lässt sich also öffnen und ausführen. Die "~"-Namen sind aber nur ein Provisorium: der Anwender sollte sie anschließend in iTrain selbst manuell in aussagekräftige Namen zurückändern - iTrain aktualisiert dabei automatisch alle Stellen, an denen der Eintrag verwendet wird.
help.referenceRenameText.en=So that referenced entries don't collide with same-named entries already present in the target file, they are renamed on export: both their own name and every place that references them get a leading "~" (e.g. "RM1" becomes "~RM1" everywhere). This keeps the target file fully functional in iTrain after import - the reference and the definition still match, so the file can be opened and run. However, the "~" names are only a placeholder: afterwards, the user should manually rename them back to meaningful names in iTrain itself - iTrain automatically updates every place the entry is used.
help.referenceRenameText.nl=Om te voorkomen dat gerefereerde items botsen met gelijknamige items die al in het doelbestand aanwezig zijn, worden ze bij het exporteren hernoemd: zowel hun eigen naam als elke plek waar ze worden gerefereerd krijgen een voorafgaand "~" (bijv. wordt "RM1" overal "~RM1"). Het doelbestand blijft daardoor na het importeren volledig functioneel in iTrain - referentie en definitie blijven bij elkaar passen, het bestand kan dus geopend en uitgevoerd worden. De "~"-namen zijn echter slechts een tijdelijke oplossing: de gebruiker moet ze daarna handmatig in iTrain zelf weer een betekenisvolle naam geven - iTrain werkt daarbij automatisch alle plekken bij waar het item wordt gebruikt.
help.referenceRenameText.fr=Pour que les entrées référencées n'entrent pas en conflit avec des entrées de même nom déjà présentes dans le fichier cible, elles sont renommées lors de l'export : leur propre nom ainsi que chaque endroit où elles sont référencées reçoivent un « ~ » en préfixe (par ex. « RM1 » devient « ~RM1 » partout). Le fichier cible reste ainsi entièrement fonctionnel dans iTrain après l'import - la référence et la définition restent cohérentes, le fichier peut donc être ouvert et utilisé. Les noms en « ~ » ne sont toutefois que provisoires : l'utilisateur doit ensuite les renommer manuellement dans iTrain lui-même avec des noms parlants - iTrain met alors automatiquement à jour tous les endroits où l'entrée est utilisée.
help.referenceRenameText.es=Para que las entradas referenciadas no choquen con entradas del mismo nombre ya presentes en el archivo de destino, se renombran durante la exportación: tanto su propio nombre como cada lugar donde se referencian reciben un «~» al principio (por ejemplo, «RM1» se convierte en «~RM1» en todas partes). Así, el archivo de destino permanece totalmente funcional en iTrain tras la importación - la referencia y la definición siguen coincidiendo, por lo que el archivo puede abrirse y ejecutarse. Sin embargo, los nombres con «~» son solo provisionales: el usuario debe renombrarlos manualmente después en el propio iTrain con nombres significativos - iTrain actualiza automáticamente todos los lugares donde se usa la entrada.
help.referenceRenameText.it=Affinché le voci referenziate non entrino in conflitto con voci omonime già presenti nel file di destinazione, vengono rinominate durante l'esportazione: sia il proprio nome sia ogni punto in cui vengono referenziate ricevono un «~» iniziale (ad es. «RM1» diventa ovunque «~RM1»). Il file di destinazione resta così completamente funzionante in iTrain dopo l'importazione - il riferimento e la definizione continuano a corrispondere, quindi il file può essere aperto ed eseguito. I nomi con «~» sono però solo provvisori: l'utente dovrebbe poi rinominarli manualmente in iTrain stesso con nomi significativi - iTrain aggiorna automaticamente tutti i punti in cui la voce viene utilizzata.

