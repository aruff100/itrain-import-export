help.fileMenuText.de=Öffnen... lädt eine bestehende .tcd- oder .tcdz-Datei. Speichern unter... speichert die aktuell geladene Datei unter einem neuen Namen bzw. Ort - bei .tcdz wird das Archiv dabei automatisch neu erzeugt. Zuletzt verwendete öffnen listet die letzten 5 geöffneten Dateien zum schnellen erneuten Öffnen auf (die älteste wird verdrängt, sobald eine 6. hinzukommt). Backup laden... öffnet den Datei-Dialog direkt im eingestellten Backup-Ordner (siehe Einstellungen → Pfade), um eine automatisch angelegte Sicherheitskopie wieder zu laden. Export Dateien öffnet eine zuvor exportierte CSV-Datei aus dem Export-Ordner und importiert deren Einträge in das aktuell geöffnete Dokument - das entspricht dem Button "Importieren" in der Kategorie-Ansicht, nur ohne dass zuerst zu einem bestimmten Reiter gewechselt werden muss.
help.fileMenuText.en=Open... loads an existing .tcd or .tcdz file. Save as... saves the currently loaded file under a new name/location - for .tcdz, the archive is automatically rebuilt. Open Recent Files lists the last 5 opened files for quick reopening (the oldest is dropped once a 6th is added). Load Backup... opens the file dialog directly in the configured backup folder (see Settings → Paths), to reload an automatically created safety copy. Export Files opens a previously exported CSV file from the export folder and imports its entries into the currently open document - equivalent to the "Import" button in the category view, just without having to switch to a specific tab first.
help.fileMenuText.nl=Openen... laadt een bestaand .tcd- of .tcdz-bestand. Opslaan als... slaat het huidige bestand op onder een nieuwe naam/locatie - bij .tcdz wordt het archief daarbij automatisch opnieuw aangemaakt. Recent gebruikte openen toont de laatste 5 geopende bestanden om snel opnieuw te openen (het oudste wordt verdrongen zodra een 6e wordt toegevoegd). Back-up laden... opent de bestandsdialoog direct in de ingestelde back-upmap (zie Instellingen → Paden), om een automatisch aangemaakte veiligheidskopie opnieuw te laden. Exportbestanden opent een eerder geëxporteerd CSV-bestand uit de exportmap en importeert de items ervan in het huidige document - vergelijkbaar met de knop "Importeren" in de categorieweergave, alleen zonder dat je eerst naar een bepaald tabblad hoeft te wisselen.
help.fileMenuText.fr=Ouvrir... charge un fichier .tcd ou .tcdz existant. Enregistrer sous... enregistre le fichier actuellement chargé sous un nouveau nom/emplacement - pour les .tcdz, l'archive est automatiquement recréée. Ouvrir les fichiers récents liste les 5 derniers fichiers ouverts pour une réouverture rapide (le plus ancien est supprimé dès qu'un 6e est ajouté). Charger une sauvegarde... ouvre la boîte de dialogue directement dans le dossier de sauvegarde configuré (voir Paramètres → Chemins), pour recharger une copie de sécurité créée automatiquement. Fichiers exportés ouvre un fichier CSV précédemment exporté depuis le dossier d'export et importe ses entrées dans le document actuellement ouvert - équivalent au bouton « Importer » dans la vue par catégorie, sans avoir à d'abord basculer vers un onglet particulier.
help.fileMenuText.es=Abrir... carga un archivo .tcd o .tcdz existente. Guardar como... guarda el archivo actualmente cargado con un nuevo nombre/ubicación - en el caso de .tcdz, el archivo comprimido se vuelve a generar automáticamente. Abrir usados recientemente enumera los últimos 5 archivos abiertos para reabrirlos rápidamente (el más antiguo se descarta en cuanto se añade un 6.º). Cargar copia de seguridad... abre el cuadro de diálogo directamente en la carpeta de copias de seguridad configurada (véase Configuración → Rutas), para volver a cargar una copia de seguridad creada automáticamente. Archivos exportados abre un archivo CSV exportado previamente desde la carpeta de exportación e importa sus entradas en el documento actualmente abierto - equivale al botón «Importar» de la vista de categoría, solo que sin tener que cambiar antes a una pestaña concreta.
help.fileMenuText.it=Apri... carica un file .tcd o .tcdz esistente. Salva con nome... salva il file attualmente caricato con un nuovo nome/percorso - per i file .tcdz l'archivio viene ricreato automaticamente. Apri utilizzati di recente elenca gli ultimi 5 file aperti per una rapida riapertura (il più vecchio viene eliminato non appena se ne aggiunge un 6°). Carica backup... apre la finestra di dialogo direttamente nella cartella di backup configurata (vedi Impostazioni → Percorsi), per ricaricare una copia di sicurezza creata automaticamente. File esportati apre un file CSV precedentemente esportato dalla cartella di esportazione e importa le sue voci nel documento attualmente aperto - equivale al pulsante «Importa» nella vista per categoria, solo senza dover prima passare a una scheda specifica.
help.fileMenuText.pt=Abrir... carrega um ficheiro .tcd ou .tcdz existente. Guardar como... guarda o ficheiro atualmente carregado com um novo nome/local - no caso de .tcdz, o arquivo é automaticamente recriado. Abrir ficheiros recentes lista os últimos 5 ficheiros abertos para reabertura rápida (o mais antigo é removido assim que um 6.º é adicionado). Carregar cópia de segurança... abre a caixa de diálogo de ficheiros diretamente na pasta de cópias de segurança configurada (ver Definições → Caminhos), para recarregar uma cópia de segurança criada automaticamente. Ficheiros de exportação abre um ficheiro CSV previamente exportado a partir da pasta de exportação e importa as suas entradas para o documento atualmente aberto - equivale ao botão "Importar" na vista de categoria, mas sem ser necessário mudar primeiro para um separador específico.
help.fileMenuText.pl=Otwórz... wczytuje istniejący plik .tcd lub .tcdz. Zapisz jako... zapisuje aktualnie wczytany plik pod nową nazwą/lokalizacją - w przypadku .tcdz archiwum jest przy tym automatycznie tworzone na nowo. Otwórz ostatnio używane wyświetla listę 5 ostatnio otwartych plików do szybkiego ponownego otwarcia (najstarszy jest usuwany po dodaniu 6.). Wczytaj kopię zapasową... otwiera okno dialogowe wyboru pliku bezpośrednio w ustawionym folderze kopii zapasowych (zob. Ustawienia → Ścieżki), aby ponownie wczytać automatycznie utworzoną kopię zapasową. Pliki eksportu otwiera wcześniej wyeksportowany plik CSV z folderu eksportu i importuje jego wpisy do aktualnie otwartego dokumentu - odpowiada to przyciskowi „Importuj” w widoku kategorii, tylko bez konieczności wcześniejszego przełączania się na konkretną kartę.
help.fileMenuText.da=Åbn... indlæser en eksisterende .tcd- eller .tcdz-fil. Gem som... gemmer den aktuelt indlæste fil under et nyt navn/sted - for .tcdz genskabes arkivet automatisk. Åbn senest brugte viser en liste over de sidste 5 åbnede filer til hurtig genåbning (den ældste fjernes, så snart en 6. tilføjes). Indlæs sikkerhedskopi... åbner fildialogen direkte i den indstillede sikkerhedskopi-mappe (se Indstillinger → Stier) for at genindlæse en automatisk oprettet sikkerhedskopi. Eksportfiler åbner en tidligere eksporteret CSV-fil fra eksportmappen og importerer dens poster i det aktuelt åbne dokument - svarende til knappen "Importér" i kategorivisningen, blot uden først at skulle skifte til en bestemt fane.
help.fileMenuText.sv=Öppna... läser in en befintlig .tcd- eller .tcdz-fil. Spara som... sparar den aktuellt inlästa filen under ett nytt namn/plats - för .tcdz återskapas arkivet automatiskt. Öppna senast använda listar de senaste 5 öppnade filerna för snabb återöppning (den äldsta tas bort så snart en 6:e läggs till). Läs in säkerhetskopia... öppnar fildialogen direkt i den inställda mappen för säkerhetskopior (se Inställningar → Sökvägar) för att läsa in en automatiskt skapad säkerhetskopia igen. Exportfiler öppnar en tidigare exporterad CSV-fil från exportmappen och importerar dess poster till det aktuellt öppna dokumentet - motsvarar knappen "Importera" i kategorivyn, fast utan att man först måste växla till en viss flik.

