help.settingsMenuText.de=Voreinstellungen öffnet ein Fenster mit drei Reitern. Pfade: Pfad für iTrain-Dateien (Standardordner, der beim Öffnen/Speichern vorgeschlagen wird), Pfad für Exports (Standardordner für CSV-Exporte/-Importe der Kategorie-Ansicht) sowie Pfad für Backups (ist er gesetzt, wird beim Öffnen einer Datei automatisch eine unveränderte Sicherheitskopie dort abgelegt, bevor irgendetwas bearbeitet wird - bis zu 10 Generationen je Datei, danach wird die älteste überschrieben; ungenutzte Backups werden beim Schließen/Ersetzen der Datei wieder gelöscht). Für alle drei Pfade lässt sich über "Durchsuchen..." ein Ordner wählen; sind bei der allerersten Programmnutzung noch keine Pfade gesetzt, fragt das Programm einmalig danach. Sprache: wechselt die Oberflächensprache (mit Flagge) unter den 10 verfügbaren Sprachen - wirkt sofort auf das ganze Programm. Ansicht: Farbschema (hell/dunkel) sowie drei Kontrollkästchen, ob die Typ-Spalte, die Auswahlbox-Spalte und der Bereich "Daten ändern" in der Kategorie-Ansicht angezeigt werden (alle standardmäßig ausgeblendet, um die Ansicht übersichtlich zu halten).
help.settingsMenuText.en=Preferences opens a window with three tabs. Paths: path for iTrain files (default folder suggested when opening/saving), path for exports (default folder for CSV export/import in the category view), and path for backups (if set, an unmodified safety copy is automatically placed there whenever a file is opened, before anything is edited - up to 10 generations per file, after which the oldest is overwritten; unused backups are deleted again when the file is closed/replaced). For all three paths, a folder can be chosen via "Browse..."; if no paths are set yet on the very first use of the program, it asks once. Language: switches the interface language (with flag) among the 10 available languages - takes effect immediately across the whole program. View: color scheme (light/dark), plus three checkboxes for whether the type column, the selection checkbox column, and the "Edit Data" panel are shown in the category view (all hidden by default to keep the view uncluttered).
help.settingsMenuText.nl=Voorkeuren opent een venster met drie tabbladen. Paden: pad voor iTrain-bestanden (standaardmap die wordt voorgesteld bij openen/opslaan), pad voor exports (standaardmap voor CSV-export/-import in de categorieweergave) en pad voor back-ups (indien ingesteld, wordt bij het openen van een bestand automatisch een ongewijzigde veiligheidskopie daar geplaatst, voordat er iets wordt bewerkt - tot 10 generaties per bestand, daarna wordt de oudste overschreven; ongebruikte back-ups worden weer verwijderd bij het sluiten/vervangen van het bestand). Voor alle drie de paden kan via "Bladeren..." een map worden gekozen; zijn bij het allereerste gebruik van het programma nog geen paden ingesteld, dan vraagt het programma daar één keer naar. Taal: wisselt de interfacetaal (met vlag) tussen de 10 beschikbare talen - werkt onmiddellijk door in het hele programma. Weergave: kleurenschema (licht/donker), plus drie selectievakjes of de typekolom, de selectievakjeskolom en het paneel "Gegevens bewerken" in de categorieweergave worden getoond (allemaal standaard verborgen om de weergave overzichtelijk te houden).
help.settingsMenuText.fr=Préférences ouvre une fenêtre à trois onglets. Chemins : chemin des fichiers iTrain (dossier par défaut proposé à l'ouverture/l'enregistrement), chemin des exports (dossier par défaut pour l'export/import CSV de la vue par catégorie) et chemin des sauvegardes (s'il est défini, une copie de sécurité non modifiée y est automatiquement déposée à chaque ouverture d'un fichier, avant toute modification - jusqu'à 10 générations par fichier, la plus ancienne étant ensuite écrasée ; les sauvegardes inutilisées sont à nouveau supprimées à la fermeture/au remplacement du fichier). Pour les trois chemins, un dossier peut être choisi via « Parcourir... » ; si aucun chemin n'est encore défini lors de la toute première utilisation du programme, celui-ci le demande une fois. Langue : change la langue de l'interface (avec drapeau) parmi les 10 langues disponibles - effet immédiat sur tout le programme. Affichage : thème de couleurs (clair/sombre), plus trois cases à cocher pour afficher ou non la colonne de type, la colonne de case à cocher de sélection et le panneau « Modifier les données » dans la vue par catégorie (tous masqués par défaut pour garder une vue claire).
help.settingsMenuText.es=Preferencias abre una ventana con tres pestañas. Rutas: ruta de archivos iTrain (carpeta predeterminada que se propone al abrir/guardar), ruta de exportaciones (carpeta predeterminada para la exportación/importación CSV de la vista de categoría) y ruta de copias de seguridad (si está definida, al abrir un archivo se coloca automáticamente allí una copia de seguridad sin modificar, antes de editar nada - hasta 10 generaciones por archivo, tras lo cual se sobrescribe la más antigua; las copias de seguridad no utilizadas se vuelven a eliminar al cerrar/reemplazar el archivo). Para las tres rutas se puede elegir una carpeta mediante «Examinar...»; si en el primerísimo uso del programa aún no hay rutas definidas, el programa lo pregunta una vez. Idioma: cambia el idioma de la interfaz (con bandera) entre los 10 idiomas disponibles - efecto inmediato en todo el programa. Vista: esquema de color (claro/oscuro), además de tres casillas de verificación para mostrar u ocultar la columna de tipo, la columna de casilla de selección y el panel «Modificar datos» en la vista de categoría (todos ocultos de forma predeterminada para mantener la vista clara).
help.settingsMenuText.it=Preferenze apre una finestra con tre schede. Percorsi: percorso dei file iTrain (cartella predefinita proposta all'apertura/salvataggio), percorso delle esportazioni (cartella predefinita per l'esportazione/importazione CSV nella vista per categoria) e percorso dei backup (se impostato, all'apertura di un file vi viene automaticamente collocata una copia di sicurezza non modificata, prima di qualsiasi modifica - fino a 10 generazioni per file, dopodiché la più vecchia viene sovrascritta; i backup inutilizzati vengono nuovamente eliminati alla chiusura/sostituzione del file). Per tutti e tre i percorsi è possibile scegliere una cartella tramite «Sfoglia...»; se al primissimo utilizzo del programma non sono ancora impostati percorsi, il programma lo chiede una volta. Lingua: cambia la lingua dell'interfaccia (con bandiera) tra le 10 lingue disponibili - effetto immediato su tutto il programma. Visualizzazione: schema colori (chiaro/scuro), più tre caselle di controllo per mostrare o meno la colonna del tipo, la colonna della casella di selezione e il pannello «Modifica dati» nella vista per categoria (tutti nascosti per impostazione predefinita per mantenere la vista ordinata).
help.settingsMenuText.pt=Preferências abre uma janela com três separadores. Caminhos: caminho para ficheiros iTrain (pasta padrão sugerida ao abrir/guardar), caminho para exportações (pasta padrão para exportação/importação CSV na vista de categoria) e caminho para cópias de segurança (se definido, ao abrir um ficheiro é automaticamente colocada aí uma cópia de segurança inalterada, antes de qualquer edição - até 10 gerações por ficheiro, após as quais a mais antiga é substituída; cópias de segurança não utilizadas são novamente eliminadas ao fechar/substituir o ficheiro). Para os três caminhos pode escolher-se uma pasta através de "Procurar..."; se ainda não houver caminhos definidos na primeiríssima utilização do programa, este pergunta uma vez. Idioma: muda o idioma da interface (com bandeira) entre os 10 idiomas disponíveis - efeito imediato em todo o programa. Vista: esquema de cores (claro/escuro), além de três caixas de verificação para mostrar ou não a coluna de tipo, a coluna da caixa de seleção e o painel "Alterar Dados" na vista de categoria (todos ocultos por predefinição para manter a vista organizada).
help.settingsMenuText.pl=Preferencje otwierają okno z trzema kartami. Ścieżki: ścieżka do plików iTrain (domyślny folder proponowany przy otwieraniu/zapisywaniu), ścieżka do eksportów (domyślny folder eksportu/importu CSV w widoku kategorii) oraz ścieżka do kopii zapasowych (jeśli ustawiona, przy każdym otwarciu pliku automatycznie umieszczana jest tam niezmieniona kopia zapasowa, zanim cokolwiek zostanie zmienione - do 10 generacji na plik, potem nadpisywana jest najstarsza; nieużywane kopie zapasowe są ponownie usuwane przy zamknięciu/zastąpieniu pliku). Dla wszystkich trzech ścieżek można wybrać folder za pomocą „Przeglądaj...”; jeśli przy pierwszym uruchomieniu programu nie ustawiono jeszcze żadnych ścieżek, program pyta o to jednorazowo. Język: zmienia język interfejsu (z flagą) spośród 10 dostępnych języków - działa natychmiast w całym programie. Widok: schemat kolorów (jasny/ciemny) oraz trzy pola wyboru określające, czy w widoku kategorii pokazywana jest kolumna typu, kolumna pola wyboru i panel „Zmień Dane” (wszystkie domyślnie ukryte, aby widok pozostał przejrzysty).
help.settingsMenuText.da=Præferencer åbner et vindue med tre faner. Stier: sti til iTrain-filer (standardmappe, der foreslås ved åbning/gemning), sti til eksporter (standardmappe til CSV-eksport/-import i kategorivisningen) samt sti til sikkerhedskopier (hvis angivet, placeres der automatisk en uændret sikkerhedskopi der, hver gang en fil åbnes, før noget redigeres - op til 10 generationer pr. fil, hvorefter den ældste overskrives; ubrugte sikkerhedskopier slettes igen, når filen lukkes/erstattes). For alle tre stier kan der vælges en mappe via "Gennemse..."; hvis der ved allerførste brug af programmet endnu ikke er angivet nogen stier, spørger programmet én gang. Sprog: skifter grænsefladesproget (med flag) mellem de 10 tilgængelige sprog - virker straks på hele programmet. Visning: farveskema (lys/mørk) samt tre afkrydsningsfelter for, om typekolonnen, valgboks-kolonnen og panelet "Rediger Data" vises i kategorivisningen (alle skjult som standard for at holde visningen overskuelig).
help.settingsMenuText.sv=Inställningar öppnar ett fönster med tre flikar. Sökvägar: sökväg för iTrain-filer (standardmapp som föreslås vid öppning/sparande), sökväg för exporter (standardmapp för CSV-export/-import i kategorivyn) samt sökväg för säkerhetskopior (om angiven placeras automatiskt en oförändrad säkerhetskopia där varje gång en fil öppnas, innan något redigeras - upp till 10 generationer per fil, därefter skrivs den äldsta över; oanvända säkerhetskopior tas bort igen när filen stängs/ersätts). För alla tre sökvägar kan en mapp väljas via "Bläddra..."; om inga sökvägar ännu är inställda vid allra första användningen av programmet frågar programmet en gång. Språk: byter gränssnittsspråk (med flagga) bland de 10 tillgängliga språken - får omedelbar effekt i hela programmet. Visning: färgschema (ljust/mörkt) samt tre kryssrutor för om typkolumnen, markeringsrutans kolumn och panelen "Ändra Data" visas i kategorivyn (alla dolda som standard för att hålla vyn överskådlig).

