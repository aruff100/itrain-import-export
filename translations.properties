# --- Ersteinrichtung (FirstRunDialog) ------------------------------
firstRun.title.de=Willkommen - Ersteinrichtung
firstRun.title.en=Welcome - First-Time Setup
firstRun.title.nl=Welkom - Eerste installatie
firstRun.title.fr=Bienvenue - Configuration initiale
firstRun.title.es=Bienvenido - Configuración inicial
firstRun.title.it=Benvenuto - Configurazione iniziale

firstRun.intro.de=Bevor es losgeht, bitte die Ordner für iTrain-Dateien, Exporte und Backups festlegen. Vorgeschlagen ist jeweils ein Standardordner unterhalb deines Benutzerverzeichnisses - über "Durchsuchen" kannst du stattdessen auch einen anderen, bereits vorhandenen Ordner wählen.
firstRun.intro.en=Before you get started, please set the folders for iTrain files, exports and backups. A default folder below your user directory is suggested for each - use "Browse..." to pick a different, already existing folder instead.
firstRun.intro.nl=Voordat je begint, stel de mappen in voor iTrain-bestanden, exports en back-ups. Voor elk wordt een standaardmap onder je gebruikersmap voorgesteld - gebruik "Bladeren..." om in plaats daarvan een andere, al bestaande map te kiezen.
firstRun.intro.fr=Avant de commencer, veuillez définir les dossiers pour les fichiers iTrain, les exports et les sauvegardes. Un dossier par défaut sous votre répertoire utilisateur est proposé pour chacun - utilisez « Parcourir... » pour choisir à la place un autre dossier déjà existant.
firstRun.intro.es=Antes de empezar, define las carpetas para los archivos de iTrain, las exportaciones y las copias de seguridad. Para cada una se propone una carpeta predeterminada bajo tu directorio de usuario - usa "Examinar..." para elegir en su lugar otra carpeta ya existente.
firstRun.intro.it=Prima di iniziare, imposta le cartelle per i file iTrain, le esportazioni e i backup. Per ciascuna viene proposta una cartella predefinita sotto la tua cartella utente - usa "Sfoglia..." per scegliere invece un'altra cartella già esistente.

