help.settingsMenuText.de=Voreinstellungen öffnet ein Fenster mit drei Reitern: Pfade (Standardordner für iTrain-Dateien, Exporte und Backups), Sprache (Oberflächensprache) sowie Ansicht (Farbschema und welche Spalten/Bereiche angezeigt werden).
help.settingsMenuText.en=Preferences opens a window with three tabs: Paths (default folders for iTrain files, exports and backups), Language (interface language), and View (color scheme and which columns/areas are shown).
help.settingsMenuText.nl=Voorkeuren opent een venster met drie tabbladen: Paden (standaardmappen voor iTrain-bestanden, exports en backups), Taal (interfacetaal) en Weergave (kleurenschema en welke kolommen/gebieden worden getoond).
help.settingsMenuText.fr=Préférences ouvre une fenêtre à trois onglets : Chemins (dossiers par défaut pour les fichiers iTrain, les exports et les sauvegardes), Langue (langue de l'interface) et Affichage (thème de couleurs et colonnes/zones affichées).
help.settingsMenuText.es=Preferencias abre una ventana con tres pestañas: Rutas (carpetas predeterminadas para archivos iTrain, exportaciones y copias de seguridad), Idioma (idioma de la interfaz) y Vista (esquema de color y qué columnas/áreas se muestran).
help.settingsMenuText.it=Preferenze apre una finestra con tre schede: Percorsi (cartelle predefinite per file iTrain, esportazioni e backup), Lingua (lingua dell'interfaccia) e Visualizzazione (schema colori e quali colonne/aree vengono mostrate).

