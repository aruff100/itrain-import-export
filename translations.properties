help.fileMenuText.de=Öffnen... lädt eine bestehende .tcd- oder .tcdz-Datei. Speichern unter... speichert die aktuell geladene Datei unter einem neuen Namen bzw. Ort - bei .tcdz wird das Archiv dabei automatisch neu erzeugt.
help.fileMenuText.en=Open... loads an existing .tcd or .tcdz file. Save as... saves the currently loaded file under a new name/location - for .tcdz, the archive is automatically rebuilt.
help.fileMenuText.nl=Openen... laadt een bestaand .tcd- of .tcdz-bestand. Opslaan als... slaat het huidige bestand op onder een nieuwe naam/locatie - bij .tcdz wordt het archief daarbij automatisch opnieuw aangemaakt.
help.fileMenuText.fr=Ouvrir... charge un fichier .tcd ou .tcdz existant. Enregistrer sous... enregistre le fichier actuellement chargé sous un nouveau nom/emplacement - pour les .tcdz, l'archive est automatiquement recréée.
help.fileMenuText.es=Abrir... carga un archivo .tcd o .tcdz existente. Guardar como... guarda el archivo actualmente cargado con un nuevo nombre/ubicación - en el caso de .tcdz, el archivo comprimido se vuelve a generar automáticamente.
help.fileMenuText.it=Apri... carica un file .tcd o .tcdz esistente. Salva con nome... salva il file attualmente caricato con un nuovo nome/percorso - per i file .tcdz l'archivio viene ricreato automaticamente.

help.editMenuTitle.de=Menü "Bearbeiten"
help.editMenuTitle.en="Edit" menu
help.editMenuTitle.nl=Menu "Bewerken"
help.editMenuTitle.fr=Menu « Édition »
help.editMenuTitle.es=Menú «Editar»
help.editMenuTitle.it=Menu «Modifica»

help.editMenuText.de=Rückgängig macht die letzte Änderung an den Daten rückgängig (Eintrag hinzugefügt/gelöscht, Attribut/Text geändert, Import...), Wiederholen stellt eine so rückgängig gemachte Änderung wieder her. Beides funktioniert auch über die beiden Symbole im Ribbon. Der Verlauf wird beim Öffnen einer neuen Datei geleert.
help.editMenuText.en=Undo reverts the last change to the data (entry added/deleted, attribute/text changed, import...), Redo restores a change that was just undone. Both also work via the two icons in the ribbon. The history is cleared when a new file is opened.
help.editMenuText.nl=Ongedaan maken maakt de laatste wijziging aan de gegevens ongedaan (item toegevoegd/verwijderd, attribuut/tekst gewijzigd, import...), Opnieuw herstelt een zo ongedaan gemaakte wijziging. Beide werken ook via de twee symbolen in het lint. De geschiedenis wordt geleegd bij het openen van een nieuw bestand.
help.editMenuText.fr=Annuler annule la dernière modification apportée aux données (entrée ajoutée/supprimée, attribut/texte modifié, import...), Rétablir restaure une modification ainsi annulée. Les deux fonctionnent aussi via les deux icônes du ruban. L'historique est effacé à l'ouverture d'un nouveau fichier.
help.editMenuText.es=Deshacer revierte el último cambio en los datos (entrada añadida/eliminada, atributo/texto modificado, importación...), Rehacer restaura un cambio así deshecho. Ambos funcionan también mediante los dos iconos de la cinta. El historial se borra al abrir un nuevo archivo.
help.editMenuText.it=Annulla annulla l'ultima modifica ai dati (voce aggiunta/eliminata, attributo/testo modificato, importazione...), Ripeti ripristina una modifica così annullata. Entrambi funzionano anche tramite le due icone nella barra multifunzione. La cronologia viene svuotata all'apertura di un nuovo file.

