help.introText.de=iTrain Import/Export ist ein Werkzeug zum Betrachten und Bearbeiten von iTrain-Modellbahn-Steuerungsdateien (.tcd/.tcdz). Der Hauptzweck ist der kategorienweise Import und Export einzelner Einträge zwischen bestehenden iTrain-Dateien - zum Beispiel um ein Gleisbild-Element, eine Aktion oder eine Lokomotive aus einer Datei in eine andere zu übernehmen. Referenzierte Einträge (z.B. die Rückmeldungen und Signale, die eine Aktion oder ein Gleisabschnitt verwendet) werden dabei automatisch erkannt und mit exportiert bzw. importiert, damit die Zieldatei in iTrain vollständig und ohne Fehlermeldung geöffnet werden kann.
help.introText.en=iTrain Import/Export is a tool for viewing and editing iTrain model railway control files (.tcd/.tcdz). Its main purpose is importing and exporting individual entries between existing iTrain files by category - for example to copy a track diagram element, an action, or a locomotive from one file to another. Referenced entries (e.g. the feedbacks and signals used by an action or a block) are automatically detected and exported/imported along with it, so the target file can be opened in iTrain completely and without errors.
help.introText.nl=iTrain Import/Export is een hulpmiddel om iTrain-modelspoorbesturingsbestanden (.tcd/.tcdz) te bekijken en te bewerken. Het hoofddoel is het per categorie importeren en exporteren van afzonderlijke items tussen bestaande iTrain-bestanden - bijvoorbeeld om een sporenplanelement, een actie of een locomotief van het ene naar het andere bestand over te nemen. Gerefereerde items (bijv. de terugmeldingen en seinen die een actie of blok gebruikt) worden daarbij automatisch herkend en mee geëxporteerd/geïmporteerd, zodat het doelbestand in iTrain volledig en zonder foutmelding kan worden geopend.
help.introText.fr=iTrain Import/Export est un outil pour consulter et modifier les fichiers de configuration de réseau ferroviaire miniature iTrain (.tcd/.tcdz). Son objectif principal est l'import et l'export d'entrées individuelles, catégorie par catégorie, entre des fichiers iTrain existants - par exemple pour reprendre un élément de plan de voies, une action ou une locomotive d'un fichier vers un autre. Les entrées référencées (par ex. les rétrosignalisations et signaux utilisés par une action ou un canton) sont automatiquement détectées et exportées/importées avec elles, afin que le fichier cible puisse être ouvert dans iTrain intégralement et sans erreur.
help.introText.es=iTrain Import/Export es una herramienta para visualizar y editar archivos de configuración de trenes en miniatura iTrain (.tcd/.tcdz). Su finalidad principal es la importación y exportación de entradas individuales, por categoría, entre archivos iTrain existentes - por ejemplo, para trasladar un elemento del plano de vías, una acción o una locomotora de un archivo a otro. Las entradas referenciadas (por ejemplo, las señales de retorno y semáforos que utiliza una acción o un bloque) se detectan automáticamente y se exportan/importan junto con ellas, de modo que el archivo de destino pueda abrirse en iTrain completo y sin errores.
help.introText.it=iTrain Import/Export è uno strumento per visualizzare e modificare i file di configurazione dei trenini iTrain (.tcd/.tcdz). Il suo scopo principale è l'importazione e l'esportazione di singole voci, per categoria, tra file iTrain esistenti - ad esempio per trasferire un elemento del piano binari, un'azione o una locomotiva da un file all'altro. Le voci referenziate (ad es. i segnali di ritorno e i segnali utilizzati da un'azione o da un blocco) vengono rilevate automaticamente ed esportate/importate insieme ad esse, in modo che il file di destinazione possa essere aperto in iTrain completo e senza errori.

