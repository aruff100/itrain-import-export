help.helpMenuText.de=Hilfe zeigt diesen Text. Update prüft manuell auf neue Programmversionen (siehe Abschnitt "Update" unten). Über zeigt Programmname, Autor und die aktuelle Versions-/Build-Nummer.
help.helpMenuText.en=Help shows this text. Update manually checks for new program versions (see the "Update" section below). About shows the program name, author, and current version/build number.
help.helpMenuText.nl=Help toont deze tekst. Update controleert handmatig op nieuwe programmaversies (zie het gedeelte "Update" hieronder). Over toont programmanaam, auteur en het huidige versie-/buildnummer.
help.helpMenuText.fr=Aide affiche ce texte. Mise à jour vérifie manuellement l'existence de nouvelles versions du programme (voir la section « Mise à jour » ci-dessous). À propos affiche le nom du programme, l'auteur et le numéro de version/build actuel.
help.helpMenuText.es=Ayuda muestra este texto. Actualización comprueba manualmente si hay nuevas versiones del programa (véase la sección «Actualización» más abajo). Acerca de muestra el nombre del programa, el autor y el número de versión/compilación actual.
help.helpMenuText.it=Guida mostra questo testo. Aggiornamento verifica manualmente la presenza di nuove versioni del programma (vedi la sezione «Aggiornamento» più sotto). Informazioni su mostra nome del programma, autore e numero di versione/build attuale.
help.helpMenuText.pt=Ajuda mostra este texto. Atualização verifica manualmente se há novas versões do programa (ver secção "Atualização" abaixo). Sobre mostra o nome do programa, o autor e o número de versão/compilação atual.
help.helpMenuText.pl=Pomoc wyświetla ten tekst. Aktualizacja ręcznie sprawdza dostępność nowych wersji programu (zob. sekcję „Aktualizacja” poniżej). O programie pokazuje nazwę programu, autora oraz aktualny numer wersji/kompilacji.
help.helpMenuText.da=Hjælp viser denne tekst. Opdatering tjekker manuelt for nye programversioner (se afsnittet "Opdatering" nedenfor). Om viser programnavn, forfatter og det aktuelle versions-/buildnummer.
help.helpMenuText.sv=Hjälp visar den här texten. Uppdatering söker manuellt efter nya programversioner (se avsnittet "Uppdatering" nedan). Om visar programnamn, författare och aktuellt versions-/byggnummer.

