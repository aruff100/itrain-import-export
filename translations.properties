help.statusBarText.de=Am unteren Rand des Fensters zeigt die Statusleiste zwei Angaben zum aktuell geöffneten Kategorie-Reiter: zuerst die Anzahl der in dieser Kategorie gelesenen Einträge (z.B. "Rückmeldungen: 42 Einträge gelesen"), danach die Anzahl der aktuell markierten Einträge in der Tabelle (z.B. "Ausgewählt: 3"). Beide Angaben aktualisieren sich automatisch beim Wechseln des Reiters sowie bei jeder Änderung der Auswahl oder der Einträge.
help.statusBarText.en=At the bottom of the window, the status bar shows two pieces of information about the currently open category tab: first the number of entries read in that category (e.g. "Feedbacks: 42 entries read"), then the number of currently selected entries in the table (e.g. "Selected: 3"). Both update automatically when switching tabs and whenever the selection or the entries change.
help.statusBarText.nl=Onderaan het venster toont de statusbalk twee gegevens over het momenteel geopende categorietabblad: eerst het aantal ingelezen items in die categorie (bijv. "Terugmeldingen: 42 items gelezen"), daarna het aantal momenteel geselecteerde items in de tabel (bijv. "Geselecteerd: 3"). Beide worden automatisch bijgewerkt bij het wisselen van tabblad en bij elke wijziging van de selectie of de items.
help.statusBarText.fr=En bas de la fenêtre, la barre d'état affiche deux informations sur l'onglet de catégorie actuellement ouvert : d'abord le nombre d'entrées lues dans cette catégorie (par ex. « Rétrosignalisations : 42 entrées lues »), puis le nombre d'entrées actuellement sélectionnées dans le tableau (par ex. « Sélectionné : 3 »). Les deux se mettent à jour automatiquement lors du changement d'onglet et à chaque modification de la sélection ou des entrées.
help.statusBarText.es=En la parte inferior de la ventana, la barra de estado muestra dos datos sobre la pestaña de categoría actualmente abierta: primero el número de entradas leídas en esa categoría (p. ej., «Señales de retorno: 42 entradas leídas»), y después el número de entradas actualmente seleccionadas en la tabla (p. ej., «Seleccionados: 3»). Ambos se actualizan automáticamente al cambiar de pestaña y con cada cambio en la selección o en las entradas.
help.statusBarText.it=In fondo alla finestra, la barra di stato mostra due informazioni sulla scheda di categoria attualmente aperta: prima il numero di voci lette in quella categoria (ad es. «Segnali di ritorno: 42 voci lette»), poi il numero di voci attualmente selezionate nella tabella (ad es. «Selezionati: 3»). Entrambe si aggiornano automaticamente al cambio di scheda e a ogni modifica della selezione o delle voci.
help.statusBarText.pt=Na parte inferior da janela, a barra de estado mostra duas informações sobre o separador de categoria atualmente aberto: primeiro o número de entradas lidas nessa categoria (por exemplo, "Sinalizações de Retorno: 42 entradas lidas"), depois o número de entradas atualmente selecionadas na tabela (por exemplo, "Selecionados: 3"). Ambas as informações são atualizadas automaticamente ao mudar de separador e sempre que a seleção ou as entradas são alteradas.
help.statusBarText.pl=W dolnej części okna pasek stanu pokazuje dwie informacje dotyczące aktualnie otwartej karty kategorii: najpierw liczbę wpisów odczytanych w tej kategorii (np. „Czujniki zwrotne: odczytano 42 wpisy”), następnie liczbę aktualnie zaznaczonych wpisów w tabeli (np. „Zaznaczono: 3”). Obie informacje aktualizują się automatycznie przy zmianie karty oraz przy każdej zmianie zaznaczenia lub wpisów.
help.statusBarText.da=Nederst i vinduet viser statuslinjen to oplysninger om den aktuelt åbne kategorifane: først antallet af poster, der er indlæst i denne kategori (f.eks. "Tilbagemeldinger: 42 poster indlæst"), derefter antallet af aktuelt markerede poster i tabellen (f.eks. "Valgt: 3"). Begge oplysninger opdateres automatisk, når fanen skiftes, samt ved enhver ændring af markeringen eller posterne.
help.statusBarText.sv=Längst ner i fönstret visar statusraden två uppgifter om den aktuellt öppna kategoriflikken: först antalet inlästa poster i den kategorin (t.ex. "Återkopplingar: 42 poster inlästa"), sedan antalet för närvarande markerade poster i tabellen (t.ex. "Markerade: 3"). Båda uppgifterna uppdateras automatiskt när man byter flik samt vid varje ändring av markeringen eller posterna.

